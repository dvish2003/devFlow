appId: com.devflow.studio
productName: DevFlow Studio
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - build/**/*
  - package.json
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
linux:
  target:
    - AppImage
    - deb
  category: Development
